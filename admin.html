<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Project - html JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="top">

<header>
    <div class="nav-container">
        <div class="logo">Ask<span>Hub</span></div>
        <div class="subtitle">A place where you can find an answer to any question.</div>

       <!--צקבוקס מוסתר-->
       <input type="checkbox" id="menu-toggle">

       <!--כפתור לפתיחת התפריט-->
       <label for="menu-toggle" class="hamburger">
        ☰
       </label>

        <nav class="menu">
            <a href="index.html">Homepage</a>
            <a href="about.html">About</a>
            <a id="login-link" href="login.html" class="login">Log In</a>
            <a id="signup-link" href="register.html" class="signup">Sign Up</a>
        </nav>
    </div>
</header>

<main class="container">
    <h1 class="site-title">Hey Admin, welcome back!</h1>
    <div class="white-bubble admin-card">
        <table id="users-table" class="admin-table">
            <thead>
                <tr>
                <th>Profile Picture</th>
                <th>Username</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Birth Date</th>
                <th>Address</th>
                <th>Actions</th>
                </tr>
            </thead>
            <tbody id="users-body"></tbody>
        </table>
    </div>
</main>


<!-- --------------------------- Edit Profile Modal --------------------------- -->

<div id="edit-profile-modal" class="modal">

    <div class="modal-content">

        <span id="close-modal" class="close">&times;</span>

        <h2>Edit Profile</h2>

        <div class="modal-steps">

            <button id="account-tab" class="active-tab" type="button">
                Edit Account Info
            </button>

            <button id="personal-tab" type="button">
                Edit Personal Details
            </button>

        </div>


        <!-- --------------------------- שלב 1 --------------------------- -->

        <div id="account-section">

            <label>
                Username
                <input type="text" id="username">
                <span id="username-error" class="error"></span>
            </label>

            <label>
                Profile Picture
                <input type="file" id="profile-pic">
                <span id="profile-pic-error" class="error"></span>
            </label>

            <label>
                Email
                <input type="email" id="mail">
                <span id="mail-error" class="error"></span>
            </label>

            <label>
                Password
                <input type="password" id="password">
                <span id="password-error" class="error"></span>
            </label>

            <label>
                Confirm Password
                <input type="password" id="confirm-password">
                <span id="confirm-password-error" class="error"></span>
            </label>

        </div>


        <!-- --------------------------- שלב 2 --------------------------- -->

        <div id="personal-section" style="display:none;">

            <label>
                First Name
                <input type="text" id="fname">
                <span id="fname-error" class="error"></span>
            </label>

            <label>
                Last Name
                <input type="text" id="lname">
                <span id="lname-error" class="error"></span>
            </label>

            <label>
                Birth Date
                <input type="date" id="bday">
                <span id="bday-error" class="error"></span>
            </label>

            <label>
                City
                <input type="text" id="city" list="cities-list">
                <datalist id="cities-list"></datalist>
                <span id="city-error" class="error"></span>
            </label>

            <label>
                Street
                <input type="text" id="street">
                <span id="street-error" class="error"></span>
            </label>

            <label>
                Street Number
                <input type="number" id="street-no">
                <span id="street-no-error" class="error"></span>
            </label>

        </div>

        <div class="modal-buttons">

            <button id="cancel-edit" type="button">
                Cancel
            </button>

            <button id="save-edit" type="button">
                Save Changes
            </button>

        </div>

    </div>

</div>

<!-- Delete User Modal -->

<div id="delete-modal" class="modal">

    <div class="delete-modal-content">

        <h3>Are you sure you want to delete this user?</h3>

        <div class="delete-buttons">

            <button id="confirm-delete" type="button">
                Yes
            </button>

            <button id="cancel-delete" type="button">
                No
            </button>

        </div>

    </div>

</div>

<footer id="form-section">
    <p class="copyright">
    © AskHub 2026</p>
</footer>
<script src="js/navbar.js"></script>
<script src="js/admin.js"></script>
<script src="js/validation.js"></script>
<script src="js/editprofile.js"></script>
</body>
</html>
